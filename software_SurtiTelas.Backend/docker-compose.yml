version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: surtitelas
      POSTGRES_PASSWORD: surtitelas123
      POSTGRES_DB: surtitelas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://surtitelas:surtitelas123@db:5432/surtitelas
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      METRICS_SECRET: ${METRICS_SECRET:-cambia-este-secret-de-metrics}
    depends_on:
      - db
      - redis
      - jaeger
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: always
    ports:
      - "4318:4318"
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_HTTP_PORT: "4318"
      QUERY_BASE_PATH: "/jaeger"
    volumes:
      - jaeger_data:/var/lib/jaeger

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  jaeger_data:
