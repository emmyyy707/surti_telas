name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: surtitelas
          POSTGRES_PASSWORD: surtitelas123
          POSTGRES_DB: surtitelas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://surtitelas:surtitelas123@localhost:5432/surtitelas

      - name: Run migrations
        run: npm run prisma:deploy
        env:
          DATABASE_URL: postgresql://surtitelas:surtitelas123@localhost:5432/surtitelas

      - name: Run seed
        run: npm run prisma:seed
        env:
          DATABASE_URL: postgresql://surtitelas:surtitelas123@localhost:5432/surtitelas

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test
        env:
          REDIS_URL: redis://localhost:6379

      - name: Run integration tests
        run: npm run test
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://surtitelas:surtitelas123@localhost:5432/surtitelas

  contract:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Pact consumer tests
        run: npm run test:pact
        env:
          NODE_ENV: test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: surtitelas
          POSTGRES_PASSWORD: surtitelas123
          POSTGRES_DB: surtitelas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://surtitelas:surtitelas123@localhost:5432/surtitelas

      - name: Run migrations
        run: npm run prisma:deploy
        env:
          DATABASE_URL: postgresql://surtitelas:surtitelas123@localhost:5432/surtitelas

      - name: Run seed
        run: npm run prisma:seed
        env:
          DATABASE_URL: postgresql://surtitelas:surtitelas123@localhost:5432/surtitelas

      - name: Run E2E tests
        run: npx playwright test
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://surtitelas:surtitelas123@localhost:5432/surtitelas

  build:
    name: Build and Push Docker
    runs-on: ubuntu-latest
    needs: [test, contract, e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/surtitelas-backend:${{ steps.meta.outputs.tag }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/surtitelas-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/surtitelas-backend:buildcache,mode=max
